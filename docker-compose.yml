version: '3.8'

services:
  web:
    build: .
    container_name: leoxur_web
    restart: always
    environment:
      - USE_MYSQL=True
      - DB_NAME=${DB_NAME:-income_tracker}
      - DB_USER=${DB_USER:-leoxur_admin}
      - DB_PASSWORD=${DB_PASSWORD:-securepassword123}
      - DB_HOST=db
      - DB_PORT=3306
      - SECRET_KEY=${SECRET_KEY:-django-production-secret-key-12345}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - web-static:/app/staticfiles
    depends_on:
      - db
    ports:
      - "8000:8000"

  db:
    image: mysql:8.0
    container_name: leoxur_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_DATABASE=${DB_NAME:-income_tracker}
      - MYSQL_USER=${DB_USER:-leoxur_admin}
      - MYSQL_PASSWORD=${DB_PASSWORD:-securepassword123}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpass123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  nginx:
    image: nginx:alpine
    container_name: leoxur_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - ./webroot:/var/www/certbot:ro
      - web-static:/app/staticfiles:ro
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    container_name: leoxur_certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./webroot:/var/www/certbot

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: leoxur_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    depends_on:
      - node-exporter
      - cadvisor

  grafana:
    image: grafana/grafana:10.0.0
    container_name: leoxur_grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: leoxur_node_exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: leoxur_cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"

volumes:
  mysql-data:
  web-static:
  certbot-etc:
  certbot-var:
  prometheus-data:
  grafana-data:
